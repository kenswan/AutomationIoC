name: Continuous Integration

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  release:
    types:
      - published

env:
  NUGET_SOURCE: "https://api.nuget.org/v3/index.json"

jobs:
  runtime:
    name: Runtime (${{ matrix.dotnet-target-framework }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        dotnet-target-framework: ["net6.0", "net7.0"]
        include:
          - dotnet-install-framework: 6.0.x
            dotnet-target-framework: net6.0
          - dotnet-install-framework: 7.0.x
            dotnet-target-framework: net7.0
    env:
      source-directory: ./src/runtime/src
      source-project: AutomationIoC.Runtime.csproj
      test-directory: ./src/runtime/test
      test-project: AutomationIoC.Runtime.Test.csproj

    steps:
      - uses: actions/checkout@v2

      - name: Install .NET
        uses: actions/setup-dotnet@v1
        with:
          dotnet-version: ${{ matrix.dotnet-install-framework }}
          include-prerelease: true

      - name: Install Dependencies
        run: |
          dotnet restore ${{ env.source-directory }}/${{ env.source-project }} -p:TargetFramework=${{ matrix.dotnet-target-framework }}
          dotnet restore ${{ env.test-directory }}/${{ env.test-project }} -p:TargetFramework=${{ matrix.dotnet-target-framework }}

      - name: Build
        working-directory: ${{ env.source-directory }}
        run: dotnet build --configuration Release -p:TargetFramework=${{ matrix.dotnet-target-framework }} --no-restore

      - name: Test
        working-directory: ${{ env.test-directory }}
        run: dotnet test -p:TargetFramework=${{ matrix.dotnet-target-framework }} --no-restore --verbosity normal
  sdk:
    name: SDK (${{ matrix.dotnet-target-framework }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        dotnet-target-framework: ["net6.0", "net7.0"]
        include:
          - dotnet-install-framework: 6.0.x
            dotnet-target-framework: net6.0
          - dotnet-install-framework: 7.0.x
            dotnet-target-framework: net7.0
    env:
      source-directory: ./src/sdk/src
      source-project: AutomationIoC.SDK.csproj
      test-directory: ./src/sdk/test
      test-project: AutomationIoC.SDK.Test.csproj

    steps:
      - uses: actions/checkout@v2

      - name: Install .NET
        uses: actions/setup-dotnet@v1
        with:
          dotnet-version: ${{ matrix.dotnet-install-framework }}
          include-prerelease: true

      - name: Install Dependencies
        run: |
          dotnet restore ${{ env.source-directory }}/${{ env.source-project }} -p:TargetFramework=${{ matrix.dotnet-target-framework }}
          dotnet restore ${{ env.test-directory }}/${{ env.test-project }} -p:TargetFramework=${{ matrix.dotnet-target-framework }}

      - name: Build
        working-directory: ${{ env.source-directory }}
        run: dotnet build --configuration Release -p:TargetFramework=${{ matrix.dotnet-target-framework }} --no-restore

      - name: Test
        working-directory: ${{ env.test-directory }}
        run: dotnet test -p:TargetFramework=${{ matrix.dotnet-target-framework }} --no-restore --verbosity normal

  tools:
    name: Tools (${{ matrix.dotnet-target-framework }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        dotnet-target-framework: ["net6.0", "net7.0"]
        include:
          - dotnet-install-framework: 6.0.x
            dotnet-target-framework: net6.0
          - dotnet-install-framework: 7.0.x
            dotnet-target-framework: net7.0
    env:
      source-directory: ./src/tools/src
      source-project: AutomationIoC.Tools.csproj
      test-directory: ./src/tools/test
      test-project: AutomationIoC.Tools.Test.csproj

    steps:
      - uses: actions/checkout@v2

      - name: Install .NET
        uses: actions/setup-dotnet@v1
        with:
          dotnet-version: ${{ matrix.dotnet-install-framework }}
          include-prerelease: true

      - name: Install Dependencies
        run: |
          dotnet restore ${{ env.source-directory }}/${{ env.source-project }} -p:TargetFramework=${{ matrix.dotnet-target-framework }}
          dotnet restore ${{ env.test-directory }}/${{ env.test-project }} -p:TargetFramework=${{ matrix.dotnet-target-framework }}

      - name: Build
        working-directory: ${{ env.source-directory }}
        run: dotnet build --configuration Release -p:TargetFramework=${{ matrix.dotnet-target-framework }} --no-restore

      - name: Test
        working-directory: ${{ env.test-directory }}
        run: dotnet test -p:TargetFramework=${{ matrix.dotnet-target-framework }} --no-restore --verbosity normal

  release:
    needs: [runtime, sdk, tools]
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    env:
      base-project: ./automation/src/AutomationIoC.csproj
      base-release-path: ./automation/src/bin/Release
      runtime-project: ./runtime/src/AutomationIoC.Runtime.csproj
      runtime-release-path: ./runtime/src/bin/Release
      sdk-project: ./sdk/src/AutomationIoC.SDK.csproj
      sdk-release-path: ./sdk/src/bin/Release
      tools-project: ./tools/src/AutomationIoC.Tools.csproj
      tools-release-path: ./tools/src/bin/Release

    steps:
      - uses: actions/checkout@v2

      - name: Install .NET
        uses: actions/setup-dotnet@v1
        with:
          dotnet-version: 7.0.x
          include-prerelease: true

      - name: Install Dependencies
        working-directory: ./src
        run: |
          dotnet restore ${{ env.runtime-project }}
          dotnet restore ${{ env.sdk-project }}
          dotnet restore ${{ env.tools-project }}

      - name: Create Release Packages
        working-directory: ./src
        run: |
          dotnet pack ${{ env.runtime-project }} -c Release --no-restore -p:PackageVersion=${{ github.event.release.tag_name }}
          dotnet pack ${{ env.sdk-project }} -c Release --no-restore -p:PackageVersion=${{ github.event.release.tag_name }}
          dotnet pack ${{ env.tools-project }} -c Release --no-restore -p:PackageVersion=${{ github.event.release.tag_name }}
          dotnet pack ${{ env.base-project }} -c Release -p:PackageVersion=${{ github.event.release.tag_name }}

      - name: Push Release Packages
        working-directory: ./src
        run: |
          dotnet nuget push ${{ env.runtime-release-path }}/AutomationIoC.Runtime.${{ github.event.release.tag_name }}.nupkg --api-key ${{ secrets.NUGET_TOKEN }} --source ${{ env.NUGET_SOURCE }}
          dotnet nuget push ${{ env.sdk-release-path }}/AutomationIoC.SDK.${{ github.event.release.tag_name }}.nupkg --api-key ${{ secrets.NUGET_TOKEN }} --source ${{ env.NUGET_SOURCE }}
          dotnet nuget push ${{ env.tools-release-path }}/AutomationIoC.Tools.${{ github.event.release.tag_name }}.nupkg --api-key ${{ secrets.NUGET_TOKEN }} --source ${{ env.NUGET_SOURCE }}
          dotnet nuget push ${{ env.base-release-path }}/AutomationIoC.${{ github.event.release.tag_name }}.nupkg --api-key ${{ secrets.NUGET_TOKEN }} --source ${{ env.NUGET_SOURCE }}
